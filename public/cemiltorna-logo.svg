<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" fill="none">
  <defs>
    <linearGradient id="gearGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
  </defs>

  <!-- Gear icon -->
  <g transform="translate(48,50)">
    <circle cx="0" cy="0" r="28" stroke="url(#gearGrad)" stroke-width="5" fill="none" opacity="0.9"/>
    <circle cx="0" cy="0" r="12" fill="url(#gearGrad)"/>
    <circle cx="0" cy="0" r="6" fill="#0a0a0b"/>
    <!-- Gear teeth -->
    <g stroke="url(#gearGrad)" stroke-width="4" stroke-linecap="round">
      <line x1="0" y1="-33" x2="0" y2="-22"/>
      <line x1="0" y1="33" x2="0" y2="22"/>
      <line x1="-33" y1="0" x2="-22" y2="0"/>
      <line x1="33" y1="0" x2="22" y2="0"/>
      <line x1="-23" y1="-23" x2="-15" y2="-15"/>
      <line x1="23" y1="23" x2="15" y2="15"/>
      <line x1="-23" y1="23" x2="-15" y2="15"/>
      <line x1="23" y1="-23" x2="15" y2="-15"/>
    </g>
  </g>

  <!-- Brand name -->
  <text x="110" y="62" font-family="system-ui,-apple-system,sans-serif" font-size="42" font-weight="800" letter-spacing="-0.5" fill="#ffffff">
    CEMİL
  </text>
  <text x="248" y="62" font-family="system-ui,-apple-system,sans-serif" font-size="42" font-weight="800" letter-spacing="-0.5" fill="url(#textGrad)">
    TORNA
  </text>

  <!-- Subtitle -->
  <text x="110" y="80" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="500" letter-spacing="3" fill="#71717a">
    TORNA VE AKİS TAMİR ATÖLYESİ
  </text>

  <!-- Decorative line -->
  <line x1="110" y1="32" x2="180" y2="32" stroke="#f97316" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
</svg>
